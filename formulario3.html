<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="formulario3.css">
</head>
<body>
    <div class="contenedor">
        <h2>Formulario</h2>
        <form action="https://formsubmit.co/eftol280471@gmail.com" method="post">

             <div class="grupo">
                <label for="nombre">Nombre :</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese sus nombres" required>
            </div>

            <div class="grupo">
                <label for="apellido">Apellidos:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese sus apellidos" required>
            </div>

            <div class="grupo">
                <label for="horario">Seleccionar su Horario de Trabajo(Usa Ctrl/Cmd para varios):</label>
                <select id="horaio" name="horario" multiple required size="3">
                    <option value="Turno Mañana">Turno Mañana</option>
                    <option value="Turno Tarde">Turno Tarde</option>
                    <option value="Turno Noche">Turno Noche</option>
                    </select>
            </div>

            <div class="grupo">
                <label for="producto">Seleccionar su producto(Usa Ctrl/Cmd para varios):</label>
                <select id="producto" name="producto" multiple required size="4">
                    <option value="Carmelo de menta">Carmelo de menta</option>
                    <option value="Galleta oreo">Galleta oreo</option> 
                    <option value="Arroz faron">Arroz faron</option>
                    <option value="Detergente ponchilo">Detergente ponchilo</option>
                    </select>         
            </div> 
            <textarea id="Observaciones" name="Observaciones" placeholder="Ingrese su Observacion" rows="10"></textarea>

            <button type="submit">Enviar Pedido</button>

        </form>
    </div>
    
</body>
</html>
